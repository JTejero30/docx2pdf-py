name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install ruff bandit mypy lxml lxml-stubs
      - name: Lint (ruff)
        run: ruff check .
      - name: Security scan (bandit)
        run: bandit -q -r docx2pdf_py/
      - name: Type check (mypy)
        run: mypy docx2pdf_py/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Tests exercise build_html (OOXML -> HTML) and only need lxml;
      # WeasyPrint (and its native libraries) is not required for the suite.
      - name: Install test deps
        run: pip install lxml pytest pytest-cov
      - name: Run tests with coverage
        run: python -m pytest -q --cov=docx2pdf_py --cov-report=term-missing --cov-fail-under=70

  engines-macos:
    # Verify engine detection works on macOS (Word/LibreOffice path logic).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install lxml pytest
      - name: Run engine-detection tests
        run: python -m pytest tests/test_engines.py -q

  e2e:
    # Full end-to-end conversion with LibreOffice (the default engine in
    # 'auto' mode when Word is absent): verifies that a valid PDF is produced.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer
      - name: Install package
        run: pip install lxml -e .
      - name: Convert a sample .docx and check the PDF
        run: python tests/e2e_smoke.py
