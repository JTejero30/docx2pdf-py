name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install ruff bandit "mypy<2" lxml lxml-stubs
      - name: Lint (ruff)
        run: ruff check .
      - name: Security scan (bandit)
        run: bandit -q -r docx2pdf_py/ --skip B404,B603,B112,B607
      - name: Type check (mypy)
        run: mypy docx2pdf_py/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      # Tests exercise build_html (OOXML -> HTML) and only need lxml;
      # WeasyPrint (and its native libraries) is not required for the suite.
      - name: Install test deps
        run: pip install --no-deps -e . && pip install lxml pytest pytest-cov hypothesis
      - name: Run tests with coverage
        run: python -m pytest -q --cov=docx2pdf_py --cov-report=term-missing --cov-fail-under=80

  engines-macos:
    # Verify engine detection works on macOS (Word/LibreOffice path logic).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install --no-deps -e . && pip install lxml pytest
      - name: Run engine-detection tests
        run: python -m pytest tests/test_engines.py -q

  e2e:
    # Full end-to-end conversion with LibreOffice (the default engine in
    # 'auto' mode when Word is absent): verifies that a valid PDF is produced.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer
      - name: Install package
        run: pip install lxml pypdf pymupdf -e .
      - name: Convert a sample .docx and check the PDF
        run: |
          python tests/e2e_smoke.py
          python tests/e2e_fidelity.py

  e2e-weasyprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install native rendering libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0
      - name: Install package
        run: pip install pypdf pymupdf -e .
      - name: Convert with WeasyPrint and verify page text
        run: |
          E2E_ENGINE=weasyprint python tests/e2e_smoke.py
          E2E_ENGINE=weasyprint python tests/e2e_fidelity.py


  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install benchmark deps
        run: pip install --no-deps -e . && pip install lxml pytest pytest-benchmark
      - name: Run benchmarks (sanity check only)
        run: python -m pytest tests/benchmarks/ -q --benchmark-disable

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build and validate wheel
        run: |
          pip install build twine
          python -m build
          python -m twine check dist/*
          pip install --force-reinstall dist/*.whl
          python -c "import docx2pdf_py; assert docx2pdf_py.__version__ == '0.2.0'"
          python -c "from importlib.resources import files; assert files('docx2pdf_py').joinpath('py.typed').is_file()"
          docx2pdf-py --version
